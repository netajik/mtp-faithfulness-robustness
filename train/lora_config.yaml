# lora_config.yaml
# Commit 9 — written after pilot, locked before training
# Identical for ALL three arms — only loss function differs
# DO NOT MODIFY after this commit
# Locked: 2026-04-18 11:59

base_model:
  name: "Llama-3.2-3B-Instruct"
  path: "/content/drive/MyDrive/mtp_project/models/Llama-3.2-3B-Instruct"

lora:
  r: 16
  lora_alpha: 32
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  lora_dropout: 0.1
  bias: none
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  max_seq_length: 512
  fp16: true
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 1
  optim: paged_adamw_8bit

data:
  dataset: alpaca
  num_rows: 15000
  seed: 42

seeds: [42, 123, 456]
